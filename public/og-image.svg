  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect x="16" y="16" width="1168" height="598" rx="22" fill="none" stroke="#2a2a35" stroke-width="2"/>
  <rect x="16" y="16" width="1168" height="6" rx="3" fill="url(#accent)"/>

